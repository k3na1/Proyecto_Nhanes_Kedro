  filepath: data/01_raw/NHANES_2017_2018_MORT_2019_PUBLIC.dat
  file_format: fwf
  load_args:
    widths: [14, 1, 1, 3, 1, 1, 1, 4, 8, 8, 3, 3]
    names: ['SEQN', 'ELIGSTAT', 'MORTSTAT', 'UCOD_LEADING', 'DIABETES', 'HYPERTEN', 'DODQTR', 'DODYEAR', 'WGT_NEW', 'SA_WGT_NEW', 'PERMTH_INT', 'PERMTH_EXM']
    dtype: str

p_mort_intermediate:
  type: pandas.ParquetDataset
  filepath: data/02_intermediate/P_MORT.parquet


